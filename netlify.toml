[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"
  NPM_FLAGS = "--legacy-peer-deps"

# Enhanced security headers with performance optimization
[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.googletagmanager.com https://cdn.gpteng.co https://www.youtube.com/s/player https://youtube.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; connect-src 'self' https: wss: https://*.supabase.co https://api.openai.com https://*.stripe.com; frame-src 'self' https://www.youtube.com https://youtube.com https://www.producthunt.com; media-src 'self' blob: https:; font-src 'self' https://fonts.gstatic.com; frame-ancestors 'self'; object-src 'none'; base-uri 'self'; form-action 'self';"
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "microphone=(self), camera=(), geolocation=(), payment=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

# Cache JS/CSS bundles with content-hash — immutable
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache fonts immutably
[[headers]]
  for = "/*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.woff"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Cache images with long expiry + stale-while-revalidate
[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=2592000, stale-while-revalidate=86400"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=2592000, stale-while-revalidate=86400"

[[headers]]
  for = "/*.webp"
  [headers.values]
    Cache-Control = "public, max-age=2592000, stale-while-revalidate=86400"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=2592000, stale-while-revalidate=86400"

# HTML — no cache, always revalidate
[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Prerendered static pages — must be before the SPA catch-all so Netlify
# serves the route-specific index.html instead of falling back to root.
[[redirects]]
  from = "/pricing"
  to = "/pricing/index.html"
  status = 200
  force = true

[[redirects]]
  from = "/pricing/"
  to = "/pricing/index.html"
  status = 200
  force = true

[[redirects]]
  from = "/about"
  to = "/about/index.html"
  status = 200
  force = true

[[redirects]]
  from = "/about/"
  to = "/about/index.html"
  status = 200
  force = true

[[redirects]]
  from = "/for-sdrs"
  to = "/for-sdrs/index.html"
  status = 200
  force = true

[[redirects]]
  from = "/for-sdrs/"
  to = "/for-sdrs/index.html"
  status = 200
  force = true

[[redirects]]
  from = "/for-founders"
  to = "/for-founders/index.html"
  status = 200
  force = true

[[redirects]]
  from = "/for-founders/"
  to = "/for-founders/index.html"
  status = 200
  force = true

[[redirects]]
  from = "/privacy"
  to = "/privacy/index.html"
  status = 200
  force = true

[[redirects]]
  from = "/privacy/"
  to = "/privacy/index.html"
  status = 200
  force = true

[[redirects]]
  from = "/terms"
  to = "/terms/index.html"
  status = 200
  force = true

[[redirects]]
  from = "/terms/"
  to = "/terms/index.html"
  status = 200
  force = true

# SPA redirect — must be last; catches all unmatched routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
